name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rag
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Deterministic, dependency-light test config.
      EMBEDDING_PROVIDER: fake
      EMBEDDING_DIMENSION: "64"
      RERANKER_ENABLED: "false"
      RETRIEVAL_BACKEND: pgvector
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: rag
      DB_USER: rag
      DB_PASSWORD: rag
      LLM_API_KEY: ci-dummy
      LLM_ENDPOINT: https://example.invalid/v1/chat/completions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Byte-compile all source
        run: python -m compileall -q src eval

      - name: Run tests
        run: pytest -q tests/

      - name: Retrieval metrics smoke (pgvector + fake embeddings)
        run: |
          python - <<'PY'
          from src import embeddings
          from src.embeddings import FakeEmbedding, set_embedding_provider
          set_embedding_provider(FakeEmbedding(dim=64))
          from src import vector_store as vs
          vs.init_schema(dim=64)
          vs.upsert_chunks([
            {"chunk_id":"x1","text":"Express Entry CRS score","metadata":{"doc_id":"d","source_url":"u","section_or_title":"s","content_hash":"h1"}},
          ])
          print("vector rows:", vs.count())
          assert vs.count() >= 1
          PY
